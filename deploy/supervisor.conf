[program:migrant-worker-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/migrant_work_tw_be/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/migrant_work_tw_be/storage/logs/worker.log
stopwaitsecs=3600

[program:migrant-worker-scheduler]
process_name=%(program_name)s
command=/bin/bash -c "while [ true ]; do php /var/www/migrant_work_tw_be/artisan schedule:run --verbose --no-interaction >> /var/www/migrant_work_tw_be/storage/logs/scheduler.log 2>&1; sleep 60; done"
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/migrant_work_tw_be/storage/logs/scheduler.log
